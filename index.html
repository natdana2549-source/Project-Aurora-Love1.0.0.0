<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Project Aurora Love ❤️</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Aurora Background -->
    <div class="background"></div>
ห
    <!-- Floating Hearts -->
    <div id="hearts"></div>

    <!-- Floating Stars -->
    <div id="stars"></div>

    <!-- Mouse Glow -->
    <div class="cursor-glow"></div>

    <!-- Main Card -->
    <main class="card">

        <!-- Cat -->
        <div class="cat-area">

            <img
                id="cat"
                src="https://media.tenor.com/IieVUsqoYCwAAAAi/peachcat-cat.gif"
                alt="Cute Cat">

        </div>

        <!-- Title -->

        <h1 id="title">

            จะจุ๊บเค้าไมม!!!?

        </h1>

        <!-- Subtitle -->

        <p id="subtitle">

            A tiny little cat has one very important question...

        </p>

        <!-- Buttons -->

        <div class="buttons">

            <button id="yesBtn">

                ❤️ YES

            </button>

            <button id="noBtn">

                😿 NO

            </button>

        </div>

    </main>

    <!-- Canvas Effect -->

    <canvas id="effectCanvas"></canvas>

    <!-- JavaScript -->

    <script src="script.js"></script>

</body>
</html>
